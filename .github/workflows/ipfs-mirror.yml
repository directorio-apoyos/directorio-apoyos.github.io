# Espejo IPFS — copia descentralizada y resistente a censura del sitio.
# En cada push sube el sitio a IPFS (vía Pinata) y registra la dirección del
# espejo de forma PRIVADA, en el resumen del propio run (pestaña Actions).
# NO publica ningún enlace en el sitio: el espejo es un plan de respaldo
# ("break-glass") que tú anuncias por tus propios canales SOLO si el sitio
# principal deja de funcionar.
#
# REQUISITO (una sola vez): un secreto del repo llamado PINATA_JWT
#   1) Crea cuenta en https://pinata.cloud  (correo neutral, vía VPN).
#   2) Pinata -> API Keys -> New Key -> Admin -> copia el JWT.
#   3) GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#        Name:  PINATA_JWT      Value: (el JWT)
# Sin el secreto, este workflow se salta solo (no falla).
#
# ¿Necesitas la dirección del espejo? Pestaña Actions -> último run "Espejo IPFS"
# -> el resumen muestra la URL lista para copiar.

name: Espejo IPFS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ipfs-mirror

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Subir y fijar el sitio en IPFS (Pinata)
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          if [ -z "$PINATA_JWT" ]; then
            echo "::notice::PINATA_JWT no configurado todavia. Espejo IPFS omitido (no es un error)."
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Subida multipart con TODOS los archivos del sitio, agrupados bajo UN
          # directorio raiz (si no, Pinata rechaza el pin con 'More than one file').
          args=()
          while IFS= read -r -d '' f; do
            args+=(-F "file=@${f};filename=site/${f#./}")
          done < <(find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './metrics-worker/*' -print0)
          resp=$(curl -sS --max-time 180 -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${PINATA_JWT}" \
            "${args[@]}" \
            -F 'pinataOptions={"cidVersion":1}' \
            -F 'pinataMetadata={"name":"apoyaronaabelardo.org"}')
          echo "Respuesta Pinata: ${resp:0:300}"
          cid=$(printf '%s' "$resp" | jq -r '.IpfsHash // empty')
          if [ -z "$cid" ]; then
            echo "::error::No se obtuvo CID. Revisa el PINATA_JWT y la respuesta de arriba."
            exit 1
          fi
          echo "cid=$cid" >> "$GITHUB_OUTPUT"
          echo "::notice::Sitio fijado en IPFS. CID: $cid"

      - name: Registrar la direccion del espejo (PRIVADO, no se publica)
        if: ${{ steps.pin.outputs.skip != '1' && steps.pin.outputs.cid != '' }}
        run: |
          CID="${{ steps.pin.outputs.cid }}"
          {
            echo "## Espejo IPFS — direccion privada (break-glass)"
            echo ""
            echo "**El espejo ES este CID** (la huella del contenido; cualquier gateway IPFS publica sirve el sitio con el):"
            echo ""
            echo "    $CID"
            echo ""
            echo "**Enlaces para anunciar** — si una gateway esta bloqueada o caida, usa otra:"
            echo ""
            echo "- https://${CID}.ipfs.dweb.link/"
            echo "- https://${CID}.ipfs.w3s.link/"
            echo "- https://ipfs.io/ipfs/${CID}/"
            echo ""
            echo "> NO aparece en el sitio publico. Compartelo por tus propios canales SOLO si el sitio principal deja de funcionar. Cualquier gateway IPFS sirve con \`/ipfs/<CID>\`."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Espejo IPFS (privado) CID: $CID"
